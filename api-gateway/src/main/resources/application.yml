server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1
            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=1
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/notifications/**
              filters:
                - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  api-key: ${APP_API_KEY:dev-api-key}
  rate-limit:
    max-requests-per-minute: ${APP_RATE_LIMIT_MAX_REQUESTS_PER_MINUTE:30}
